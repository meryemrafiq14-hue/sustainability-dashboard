::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
button:focus{outline:none}
a{text-decoration:none}

.map-tooltip{pointer-events:none;opacity:0;transition:opacity .15s ease}
.map-bubble:hover .map-tooltip{opacity:1}
@keyframes drawerSlideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes drawerSlideOut{from{transform:translateX(0)}to{transform:translateX(100%)}}

.ai-fab:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,.4)}
.ai-fab:active{transform:translateY(0)}
.ai-drawer-backdrop{position:fixed;inset:0;z-index:950;background:rgba(15,23,42,.18);backdrop-filter:blur(2px);transition:opacity .25s ease}
.ai-drawer{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:92vw;z-index:960;background:white;box-shadow:-8px 0 40px rgba(0,0,0,.1);display:flex;flex-direction:column;animation:drawerSlideIn .3s ease forwards}

<script type="text/babel" data-presets="react">

const KEYWORDS=[
  {word:"Volunteering",count:53,sdgs:[17,10]},{word:"Environmental Policy",count:37,sdgs:[13,7]},
  {word:"Artificial Intelligence",count:36,sdgs:[9,3]},{word:"General Equilibrium",count:35,sdgs:[8,10]},
  {word:"Environmental Tax",count:35,sdgs:[13,12]},{word:"Climate Change",count:28,sdgs:[13,7]},

const COUNTRY_DATA={

const COLLAB_PAIRS={
  "Business Admin":[
    {pair:"Lough, Benjamin + Rios, Kimberly",sdgs:"SDG 17+10",outcome:"International volunteering and inequality reduction frameworks",score:89,
      themes:["International Development","Social Equity"],sharedSdgs:[10,17],impactPotential:"High — combined 70 papers across underserved SDGs"},
    {pair:"Ahsen, Mehmet + Reif, Julian",sdgs:"SDG 3",outcome:"AI-driven public health policy optimization",score:82,
      themes:["AI in Healthcare","Health Economics"],sharedSdgs:[3],impactPotential:"Medium — strong methodological overlap"}
  ],
  "Finance":[
    {pair:"Fullerton, Don + Deryugina, Tatyana",sdgs:"SDG 13",outcome:"Carbon pricing and environmental tax policy reform",score:94,
      themes:["Environmental Economics","Climate Policy"],sharedSdgs:[13,11],impactPotential:"Very High — 47 combined papers, direct policy relevance"},
    {pair:"Brown, Jeffrey + Molitor, David",sdgs:"SDG 1+3",outcome:"Retirement security and public health financing",score:87,
      themes:["Public Finance","Health Policy"],sharedSdgs:[1,3],impactPotential:"High — bridges poverty and health economics"}
  ],
  "Accountancy":[
    {pair:"Accountancy + Finance Faculty",sdgs:"SDG 8+12",outcome:"Sustainable corporate governance and ESG reporting",score:78,
      themes:["Corporate Governance","ESG Reporting"],sharedSdgs:[8,12,16],impactPotential:"Medium — emerging interdisciplinary area"}
  ],
  "Gies Affiliates":[
    {pair:"Rios, Kimberly + Lough, Benjamin",sdgs:"SDG 10+17",outcome:"Cross-cultural equity and global partnership frameworks",score:85,
      themes:["Cultural Psychology","Global Partnerships"],sharedSdgs:[10,17],impactPotential:"High — unique cross-unit collaboration potential"}
  ]
};
const SDG_META={
  1:{color:"#E5243B",name:"No Poverty"},2:{color:"#DDA63A",name:"Zero Hunger"},
  3:{color:"#4C9F38",name:"Good Health"},4:{color:"#C5192D",name:"Quality Education"},
  5:{color:"#FF3A21",name:"Gender Equality"},6:{color:"#26BDE2",name:"Clean Water"},
  7:{color:"#FCC30B",name:"Affordable Energy"},8:{color:"#A21942",name:"Decent Work"},
  9:{color:"#FD6925",name:"Industry & Innovation"},10:{color:"#DD1367",name:"Reduced Inequalities"},
  11:{color:"#FD9D24",name:"Sustainable Cities"},12:{color:"#BF8B2E",name:"Consumption"},
  13:{color:"#3F7E44",name:"Climate Action"},14:{color:"#0A97D9",name:"Life Below Water"},
  15:{color:"#56C02B",name:"Life on Land"},16:{color:"#00689D",name:"Peace & Justice"},
  17:{color:"#19486A",name:"Partnerships"}
};

const GLOBAL_SDG_SHARE={
  1:4.2, 2:5.8, 3:14.1, 4:6.3, 5:5.9, 6:5.2, 7:6.1, 8:6.8,
  9:7.4, 10:5.5, 11:6.0, 12:5.3, 13:8.2, 14:5.6, 15:5.8, 16:4.8, 17:3.0
};

const TOTAL_PAPERS=Object.values(SDG_COUNTS).reduce((a,b)=>a+b,0);
function computeGapIndex(){
  const gaps={};
  for(let id=1;id<=17;id++){
    const instShare=((SDG_COUNTS[id]||0)/TOTAL_PAPERS)*100;
    const globalShare=GLOBAL_SDG_SHARE[id]||0;
    gaps[id]=+(instShare-globalShare).toFixed(1);
  }
  return gaps;
}
const GAP_INDEX=computeGapIndex();
const UNDER_INDEXED=Object.entries(GAP_INDEX).sort((a,b)=>a[1]-b[1]).slice(0,5).map(([id,v])=>({id:+id,gap:v}));
const OVER_INDEXED=Object.entries(GAP_INDEX).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,v])=>({id:+id,gap:v}));
const LARGEST_GAP=UNDER_INDEXED[0];

function getPriorityTag(gapValue){
  const mag=Math.abs(gapValue);
  if(mag>5) return {label:"High",color:"#92400e",bg:"#fef3c7",border:"#fde68a"};
  if(mag>=2) return {label:"Medium",color:"#1e40af",bg:"#dbeafe",border:"#bfdbfe"};
  return {label:"Low",color:"#6b7280",bg:"#f3f4f6",border:"#e5e7eb"};
}

function computeGapClosure(sdgId){
  const gap=GAP_INDEX[sdgId];
  const instShare=((SDG_COUNTS[sdgId]||0)/TOTAL_PAPERS)*100;
  const globalShare=GLOBAL_SDG_SHARE[sdgId]||0;
  if(gap<0){
    const requiredPapers=Math.ceil((globalShare-instShare)/100*TOTAL_PAPERS);
    return {type:"under",required:requiredPapers,sdgId,gap};
  }
  if(gap>0){
    const excessPapers=Math.floor((instShare-globalShare)/100*TOTAL_PAPERS);
    return {type:"over",excess:excessPapers,sdgId,gap};
  }
  return {type:"aligned",sdgId,gap:0};
}

// ── Contextual AI Insights (deterministic, rule-based) ────────
function generateStrategicSnapshot(selectedSDG){
  const total=TOTAL_PAPERS;
  if(selectedSDG){
    const id=selectedSDG;
    const meta=SDG_META[id];
    const count=SDG_COUNTS[id]||0;
    const gap=GAP_INDEX[id];
    const globalShare=GLOBAL_SDG_SHARE[id];
    const instShare=((count)/total*100).toFixed(1);
    const relevantResearchers=RESEARCHERS.filter(r=>r.sdgs.includes(id));
    const relevantDepts=DEPT_DATA.filter(d=>d.sdgs.includes(id));
    const relevantKeywords=KEYWORDS.filter(k=>k.sdgs.includes(id));
    const closure=computeGapClosure(id);
    const insights=[];
    if(count===0){
      insights.push({icon:"down",color:"#ef4444",text:`SDG ${id} (${meta.name}) has zero Gies publications. Global benchmark allocates ${globalShare}% — a ${Math.abs(gap)}pp gap and strategic opportunity.`});
    } else {
      insights.push({icon:"up",color:meta.color,text:`SDG ${id} (${meta.name}): ${count} papers (${instShare}% of output). ${gap>=0?`+${gap}pp above benchmark.`:`${Math.abs(gap)}pp below benchmark.`} ${relevantDepts.length>0?`Active in ${relevantDepts.map(d=>d.dept).join(", ")}.`:""}`});
    }
    if(relevantResearchers.length>0){
      const topR=relevantResearchers.slice(0,3);
      insights.push({icon:"globe",color:"#0A97D9",text:`Key researchers: ${topR.map(r=>`${r.name} (${r.count} papers)`).join("; ")}.`});
    } else {
      insights.push({icon:"down",color:"#ef4444",text:`No researchers currently indexed for SDG ${id}. Faculty recruitment or cross-departmental initiative opportunity.`});
    }
    if(closure.type==="under"){
      insights.push({icon:"trend",color:"#e85d26",text:`Gap closure requires +${closure.required} additional papers to match global SDG ${id} share.`});
    } else if(closure.type==="over"){
      insights.push({icon:"up",color:"#16a34a",text:`Exceeds global benchmark by ~${closure.excess} papers. Position for thought leadership.`});
    }
    if(relevantKeywords.length>0){
      insights.push({icon:"globe",color:"#6366f1",text:`Research themes: ${relevantKeywords.slice(0,4).map(k=>k.word).join(", ")}.`});
    }
    return insights;
  }
  const top2=Object.entries(SDG_COUNTS).sort((a,b)=>b[1]-a[1]).slice(0,2);
  const zeros=Object.entries(SDG_COUNTS).filter(([,c])=>c===0).map(([id])=>+id);
  const bigUnder=UNDER_INDEXED[0];
  const bigOver=OVER_INDEXED[0];
  const growth=Math.round(((76-17)/17)*100);
  return [
    {icon:"up",color:"#3F7E44",text:`Top output: SDG ${top2[0][0]} (${top2[0][1]} papers) and SDG ${top2[1][0]} (${top2[1][1]} papers) — ${Math.round((+top2[0][1]+ +top2[1][1])/total*100)}% of sustainable output.`},
    {icon:"down",color:"#ef4444",text:`Zero coverage: ${zeros.map(id=>`SDG ${id} (${SDG_META[id].name})`).join(", ")} — unaddressed global priorities.`},
    {icon:"globe",color:"#0A97D9",text:`Largest gap: SDG ${bigUnder.id} at ${Math.abs(bigUnder.gap)}pp under. Strongest: SDG ${bigOver.id} at +${bigOver.gap}pp over benchmark.`},
    {icon:"trend",color:"#e85d26",text:`Growth: +${growth}% from 2010–2020 (17 to 76 papers/year). Peak acceleration +${Math.round((76-65)/65*100)}% in final year.`}
  ];
}

// ── Strategic Recommendations with bullet + rationale structure ──
function generateRecommendations(selectedSDG){
  if(selectedSDG){
    const id=selectedSDG;
    const gap=GAP_INDEX[id];
    const count=SDG_COUNTS[id]||0;
    const meta=SDG_META[id];
    const relevantResearchers=RESEARCHERS.filter(r=>r.sdgs.includes(id));
    const nonCoveredDepts=DEPT_DATA.filter(d=>!d.sdgs.includes(id));
    const recs=[];
    if(count===0){
      recs.push({bullet:`Initiate targeted faculty recruitment for SDG ${id} (${meta.name})`,rationale:`Zero coverage against ${GLOBAL_SDG_SHARE[id]}% global benchmark. New hires in ${nonCoveredDepts.map(d=>d.dept).join(", ")} would address this directly.`});
      recs.push({bullet:`Explore cross-departmental seed grants for SDG ${id}`,rationale:`Interdisciplinary funding incentivizes research from existing faculty without new hiring costs.`});
      recs.push({bullet:`Consider external institutional partnerships`,rationale:`Collaborating with active institutions accelerates output while Gies builds internal capacity.`});
    } else if(gap<-3){
      recs.push({bullet:`Expand research capacity in SDG ${id} — ${Math.abs(gap)}pp below benchmark`,rationale:`Significant gap relative to global norms. Targeted investment can close this within 2–3 funding cycles.`});
      if(relevantResearchers.length>0){
        recs.push({bullet:`Support ${relevantResearchers.slice(0,2).map(r=>r.name).join(", ")} with additional resources`,rationale:`Existing researchers have demonstrated output; incremental support yields faster returns.`});
      }
      if(nonCoveredDepts.length>0){
        recs.push({bullet:`Incentivize ${nonCoveredDepts[0].dept} faculty to contribute`,rationale:`Cross-departmental grants broaden the research base and reduce concentration risk.`});
      }
    } else if(gap<0){
      recs.push({bullet:`Modest investment — ${Math.abs(gap)}pp below benchmark`,rationale:`Manageable gap. Supporting current researchers can close it incrementally.`});
      recs.push({bullet:`Leverage existing work by ${relevantResearchers.length>0?relevantResearchers[0].name:"current faculty"}`,rationale:`Building on demonstrated capability is more efficient than new program creation.`});
    } else {
      recs.push({bullet:`Position Gies as thought leader in ${meta.name} (+${gap}pp)`,rationale:`Exceeding global benchmark presents a branding and donor engagement opportunity.`});
      recs.push({bullet:`Publish institutional impact reports highlighting SDG ${id}`,rationale:`Research leadership directly supports fundraising and recruitment objectives.`});
      if(relevantResearchers.length>1){
        recs.push({bullet:`Facilitate ${relevantResearchers[0].name} + ${relevantResearchers[1].name} collaboration`,rationale:`Deepening existing strengths compounds the leadership position.`});
      }
    }
    return recs.slice(0,4);
  }
  const zeroSDGs=Object.entries(SDG_COUNTS).filter(([,c])=>c===0).map(([id])=>+id);
  const bigUnder=UNDER_INDEXED.slice(0,2);
  return [
    {bullet:`Expand faculty hiring in ${zeroSDGs.map(id=>`SDG ${id}`).join(" & ")}`,rationale:`Zero coverage against ~5.7% global benchmark each — most actionable gap.`},
    {bullet:`Cross-department SDG ${bigUnder[1]?.id||2} seed grants`,rationale:`Targeted interdisciplinary funding addresses the second-largest gap efficiently.`},
    {bullet:`Reallocate ~${Math.round(zeroSDGs.length/17*100)}% of sustainability funding to under-indexed areas`,rationale:`${bigUnder.map(g=>`SDG ${g.id}`).join(", ")} are highest-priority reallocation targets.`},
    {bullet:`Leverage SDG 3 and SDG 10 for donor engagement narratives`,rationale:`Over-indexing provides compelling evidence for fundraising storytelling.`}
  ];
}

function generateGlobalInsights(){
  const bigUnder=UNDER_INDEXED.slice(0,3);
  const bigOver=OVER_INDEXED.slice(0,2);
  const topCountry=Object.entries(COUNTRY_DATA).sort((a,b)=>b[1].count-a[1].count)[0];
  return [
    `Research reaches ${Object.keys(COUNTRY_DATA).length} countries; ${topCountry[0]} leads with ${topCountry[1].count} co-publication signals.`,
    `Largest gaps: ${bigUnder.map(g=>`SDG ${g.id} (${g.gap}pp)`).join(", ")} — priority areas for faculty recruitment.`,
    `Strongest alignment: ${bigOver.map(g=>`SDG ${g.id} (+${g.gap}pp)`).join(", ")} — exceeds global benchmarks.`,
    `SDG 14 and 15 at zero coverage vs. ~5.7% global benchmark — most actionable strategic gaps.`
  ];
}

function generateAIResponse(msg){
  const q=msg.toLowerCase();
  if(q.includes("climate")||q.includes("carbon")||q.includes("sdg 13")){
    return "Climate Action (SDG 13): 46 papers, +7.1pp vs benchmark. Led by Fullerton (35 papers, carbon pricing) and Deryugina (12 papers, climate economics). Note: SDG 14/15 remain at zero — adjacent but unaddressed.";
  }
  if(q.includes("gap")||q.includes("missing")||q.includes("zero")||q.includes("benchmark")){
    return `Gap Index summary:\n\nUnder-indexed:\n${UNDER_INDEXED.slice(0,3).map(g=>`  SDG ${g.id} ${SDG_META[g.id].name}: ${g.gap}pp`).join("\n")}\n\nOver-indexed:\n${OVER_INDEXED.slice(0,3).map(g=>`  SDG ${g.id} ${SDG_META[g.id].name}: +${g.gap}pp`).join("\n")}`;
  }
  if(q.includes("collaborat")||q.includes("partner")||q.includes("sdg 17")){
    return "Top pairing: Fullerton + Lough (94% compatibility). Both in environmental economics across Finance and Business Admin. Zero co-publications despite 88 combined papers. SDG 17 is Gies' strongest area (+14.6pp).";
  }
  if(q.includes("grow")||q.includes("trend")||q.includes("year")){
    return "Growth: +347% from 2010 to 2020 (17 to 76 papers/year). Acceleration post-2017. Business Admin and Finance drove most growth. No post-2020 data indexed.";
  }
  if(q.includes("researcher")||q.includes("professor")||q.includes("faculty")||q.includes("who")){
    return "Top researchers:\n  Lough (Business Admin) — 53 papers, SDG 17\n  Fullerton (Finance) — 35 papers, SDG 13\n  Ahsen (Business Admin) — 29 papers, SDG 3\n  Rios (Affiliates) — 17 papers, SDG 10";
  }
  if(q.includes("health")||q.includes("sdg 3")){
    return "SDG 3: 141 papers, +19.3pp above benchmark. Led by Ahsen (29), Molitor (13), Reif (13). Most cross-departmental SDG at Gies.";
  }
  if(q.includes("department")||q.includes("dept")||q.includes("finance")||q.includes("business")){
    return "Departments:\n  Business Admin: 250 papers (58.7%)\n  Finance: 121 papers (28.4%)\n  Accountancy: 34 papers (8.0%)\n  Affiliates: 21 papers (4.9%)\n\nBusiness Admin + Finance = 87% of output.";
  }
  if(q.includes("recommend")||q.includes("action")||q.includes("strategy")){
    return "Recommendations:\n  Expand hiring in SDG 14 & 15 (zero coverage)\n  Cross-department SDG 2 seed grants\n  Reallocate ~12% of funding to under-indexed areas\n  Leverage SDG 3/10 strengths for donor engagement";
  }
  return "Ask about: SDG gaps, researchers, collaborations, departments, trends, or recommendations. Covering 2,022 papers (2010-2020).";
}

// ── COMPONENTS ───────────────────────────────────────────────

function ShimmerBlock({lines=3}){
  return (
    <div style={{padding:2}}>
      {Array.from({length:lines}).map((_,i)=>(
        <div key={i} className="shimmer-line" style={{width:i===lines-1?"60%":"100%"}}/>
      ))}
    </div>
  );
}

// ── SDG Wheel — UPGRADED: ~12% larger (360x360), focal visual anchor ──
function SDGWheel({selected,onToggle,showGlobal}){
  const cx=180,cy=180,ir=76,r=162,sweep=(2*Math.PI)/17;
  const total=Object.values(SDG_COUNTS).reduce((a,b)=>a+b,0);
  const selTotal=selected.reduce((s,id)=>s+(SDG_COUNTS[id]||0),0);
  const globalTotal=Object.values(GLOBAL_SDG_SHARE).reduce((a,b)=>a+b,0);
  const outerR=174, outerIr=165;
  return (
    <svg viewBox="0 0 360 360" style={{width:"100%",height:"100%",filter:"drop-shadow(0 4px 20px rgba(0,0,0,0.08))"}}>
      {showGlobal&&(
        <g opacity=".35">
          {Array.from({length:17},(_,i)=>{
            const id=i+1;
            let startAngle=-Math.PI/2;
            for(let j=1;j<id;j++) startAngle+=(GLOBAL_SDG_SHARE[j]/globalTotal)*2*Math.PI;
            const arcLen=(GLOBAL_SDG_SHARE[id]/globalTotal)*2*Math.PI;
            const ea=startAngle+arcLen;
            const c1=Math.cos(startAngle),s1=Math.sin(startAngle),c2=Math.cos(ea),s2=Math.sin(ea);
            const d=`M${cx+outerIr*c1} ${cy+outerIr*s1}L${cx+outerR*c1} ${cy+outerR*s1}A${outerR} ${outerR} 0 0 1 ${cx+outerR*c2} ${cy+outerR*s2}L${cx+outerIr*c2} ${cy+outerIr*s2}A${outerIr} ${outerIr} 0 0 0 ${cx+outerIr*c1} ${cy+outerIr*s1}`;
            return <path key={id} d={d} fill={SDG_META[id].color} stroke="white" strokeWidth="1"/>;
          })}
        </g>
      )}
      <g className="sdg-ring">
        {Array.from({length:17},(_,i)=>{
          const id=i+1,sa=i*sweep-Math.PI/2,ea=sa+sweep;
          const c1=Math.cos(sa),s1=Math.sin(sa),c2=Math.cos(ea),s2=Math.sin(ea);
          const mid=sa+sweep/2;
          const isSel=selected.includes(id),anysel=selected.length>0;
          const d=`M${cx+ir*c1} ${cy+ir*s1}L${cx+r*c1} ${cy+r*s1}A${r} ${r} 0 0 1 ${cx+r*c2} ${cy+r*s2}L${cx+ir*c2} ${cy+ir*s2}A${ir} ${ir} 0 0 0 ${cx+ir*c1} ${cy+ir*s1}`;
          return (
            <g key={id} onClick={()=>onToggle(id)} style={{cursor:"pointer",opacity:anysel&&!isSel ? 0.18 : 1,transition:"opacity .3s",filter:isSel?"drop-shadow(0 0 6px rgba(0,0,0,.3))":"none"}}>
              <path d={d} fill={SDG_META[id].color} stroke="white" strokeWidth="2.5"/>
              <text x={cx+(r-24)*Math.cos(mid)} y={cy+(r-24)*Math.sin(mid)+1} textAnchor="middle" dominantBaseline="middle" fontSize="11" fill="white" fontWeight="bold">{id}</text>
            </g>
          );
        })}
      </g>
      <circle cx={cx} cy={cy} r={ir-2} fill="white" style={{filter:"drop-shadow(0 2px 8px rgba(0,0,0,.06))"}}/>
      {selected.length>0?(
        <>
          <text x={cx} y={cy-18} textAnchor="middle" fontSize="36" fontWeight="900" fill="#0a1628">{selTotal}</text>
          <text x={cx} y={cy+5} textAnchor="middle" fontSize="8.5" fill="#94a3b8" letterSpacing="1.5">PAPERS</text>
          <text x={cx} y={cy+20} textAnchor="middle" fontSize="8" fill={SDG_META[selected[0]]?.color||"#94a3b8"} fontWeight="700">SDG {selected.join(", ")}</text>
          <text x={cx} y={cy+34} textAnchor="middle" fontSize="7.5" fill="#94a3b8">{SDG_META[selected[0]]?.name}</text>
        </>
      ):(
        <>
          <text x={cx} y={cy-16} textAnchor="middle" fontSize="36" fontWeight="900" fill="#0a1628">{total}</text>
          <text x={cx} y={cy+5} textAnchor="middle" fontSize="8.5" fill="#94a3b8" letterSpacing="1.5">TOTAL PAPERS</text>
          {showGlobal?(
            <>
              <text x={cx} y={cy+20} textAnchor="middle" fontSize="7.5" fill="#64748b">Inner = Gies</text>
              <text x={cx} y={cy+32} textAnchor="middle" fontSize="7.5" fill="#64748b" opacity=".6">Outer = Global</text>
            </>
          ):(

              <text x={cx} y={cy+20} textAnchor="middle" fontSize="8" fill="#94a3b8">15 of 17 SDGs covered</text>
              <text x={cx} y={cy+34} textAnchor="middle" fontSize="7" fill="#cbd5e1">click segments to filter</text>
            </>
          )}
        </>
      )}
    </svg>
  );
}

// ── WORLD MAP — D3 Natural Earth projection + TopoJSON ───────
function WorldMap(){
  const containerRef=React.useRef(null);
  const svgRef=React.useRef(null);
  const [ready,setReady]=React.useState(false);
  const [error,setError]=React.useState(false);
  const W=960,H=500;

  React.useEffect(()=>{
    let cancelled=false;
    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
      .then(r=>{if(!r.ok)throw new Error();return r.json();})
      .then(topo=>{
        if(cancelled)return;
        const countries=topojson.feature(topo,topo.objects.countries);
        const borders=topojson.mesh(topo,topo.objects.countries,(a,b)=>a!==b);
        renderMap(countries,borders);
        setReady(true);
      })
      .catch(()=>{if(!cancelled)setError(true);});
    return()=>{cancelled=true;};
  },[]);

  function renderMap(countries,borders){
    const svg=d3.select(svgRef.current);
    svg.selectAll("*").remove();

    // --- Natural Earth projection, fitted to viewBox ---
    const projection=d3.geoNaturalEarth1()
      .fitSize([W-40,H-40],countries)
      .translate([W/2,H/2]);
    const path=d3.geoPath(projection);

    // --- Defs: glow filter for hovered bubbles ---
    const defs=svg.append("defs");
    const filt=defs.append("filter").attr("id","mapGlow");
    filt.append("feGaussianBlur").attr("in","SourceGraphic").attr("stdDeviation","3").attr("result","blur");
    const merge=filt.append("feMerge");
    merge.append("feMergeNode").attr("in","blur");
    merge.append("feMergeNode").attr("in","SourceGraphic");

    // --- Sphere outline (ocean) ---
    svg.append("path")
      .datum({type:"Sphere"})
      .attr("d",path)
      .attr("fill","#FAFBFC")
      .attr("stroke","#E2E8F0")
      .attr("stroke-width",0.8);

    // --- Country fills ---
    svg.append("g")
      .selectAll("path")
      .data(countries.features)
      .join("path")
      .attr("d",path)
      .attr("fill","#E5E7EB")
      .attr("class","map-country");

    // --- Internal borders ---
    svg.append("path")
      .datum(borders)
      .attr("d",path)
      .attr("fill","none")
      .attr("stroke","#D1D5DB")
      .attr("stroke-width",0.5)
      .attr("stroke-linejoin","round");

    // --- Research bubbles ---
    const max=Math.max(...Object.values(COUNTRY_DATA).map(d=>d.count));
    const entries=Object.entries(COUNTRY_DATA).sort((a,b)=>a[1].count-b[1].count);

    const bubbleG=svg.append("g").attr("class","map-bubbles");

    entries.forEach(([name,{lat,lng,count}])=>{
      const [cx,cy]=projection([lng,lat]);
      if(cx==null||cy==null)return;
      const r=6+(count/max)*14;

      const g=bubbleG.append("g").attr("class","map-bubble");

      // Outer glow ring
      g.append("circle")
        .attr("class","bubble-outer")
        .attr("cx",cx).attr("cy",cy).attr("r",r*2)
        .attr("fill","#e85d26").attr("opacity",0.06);

      // Main circle
      g.append("circle")
        .attr("class","bubble-inner")
        .attr("cx",cx).attr("cy",cy).attr("r",r)
        .attr("fill","#e85d26")
        .attr("stroke","#fff").attr("stroke-width",1.5);

      // Count label
      g.append("text")
        .attr("x",cx).attr("y",cy+0.5)
        .attr("text-anchor","middle")
        .attr("dominant-baseline","central")
        .attr("fill","#fff")
        .attr("font-size",r>13?11:9)
        .attr("font-weight",700)
        .attr("font-family","system-ui,-apple-system,sans-serif")
        .attr("pointer-events","none")
        .text(count);

      // Tooltip group (hidden by default via CSS)
      const tip=g.append("g").attr("class","map-tooltip");
      const label=`${name}  ·  ${count} papers`;
      const tw=label.length*6.2+22;
      const tx=cx+r+8,ty=cy;

      // Flip tooltip left if it would overflow right edge
      const flipLeft=tx+tw>W-10;
      const finalX=flipLeft?cx-r-8-tw:tx;

      tip.append("rect")
        .attr("x",finalX).attr("y",ty-14)
        .attr("width",tw).attr("height",28)
        .attr("rx",6)
        .attr("fill","#0F172A").attr("opacity",0.92);
      tip.append("text")
        .attr("x",finalX+11).attr("y",ty+1)
        .attr("fill","#fff")
        .attr("font-size",11)
        .attr("font-weight",600)
        .attr("font-family","system-ui,-apple-system,sans-serif")
        .attr("dominant-baseline","central")
        .text(label);
    });
  }

  return (
    <div ref={containerRef} style={{borderRadius:10,overflow:"hidden",background:"#FAFBFC",border:"1px solid #E5E7EB"}}>
      {error?(
        <div style={{height:280,display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:12}}>Unable to load map data.</div>
      ):!ready?(
        <div style={{height:280,display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:12,gap:8}}>
          <svg width="16" height="16" viewBox="0 0 16 16" style={{animation:"sdg-spin 1s linear infinite"}}><circle cx="8" cy="8" r="6" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="28" strokeDashoffset="8"/></svg>
          Loading map…
        </div>
      ):null}
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`}
        style={{display:ready?"block":"none",width:"100%"}}
        preserveAspectRatio="xMidYMid meet"/>
    </div>
  );
}

                    </div>
                    <div style={{fontSize:8,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>5-Step Journey</div>
                    <div style={{display:"flex",alignItems:"flex-start",marginBottom:8,position:"relative"}}>
                      <div style={{position:"absolute",top:12,left:14,right:14,height:1.5,background:p.color,opacity:.08}}/>
                      {p.steps.map((s,i)=>(
                        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",position:"relative",zIndex:1}}>
                          <div style={{width:20,height:20,borderRadius:"50%",background:p.color,color:"white",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:3,boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>{i+1}</div>
                          <div style={{fontSize:8,fontWeight:700,color:"#334155",lineHeight:1.2}}>{s.l}</div>
                          <div style={{fontSize:7,color:"#94a3b8",marginTop:1}}>{s.d}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:8}}>
                      {p.features.map(f=><span key={f} style={{fontSize:8,padding:"2px 6px",borderRadius:20,background:p.color+"10",color:p.color,fontWeight:600,border:`1px solid ${p.color}20`}}>{f}</span>)}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                      <div style={{background:"#f8fafc",borderRadius:6,padding:"5px 8px",borderLeft:`3px solid ${p.color}`}}>
                        <div style={{fontSize:8,fontWeight:700,color:"#94a3b8",marginBottom:1}}>OUTCOME</div>
                        <div style={{fontSize:10,fontWeight:700,color:"#334155"}}>{p.outcome}</div>
                      </div>
                      <div style={{background:"#f8fafc",borderRadius:7,padding:"7px 9px",borderLeft:"3px solid #16a34a"}}>
                        <div style={{fontSize:8,fontWeight:700,color:"#94a3b8",marginBottom:1}}>EFFICIENCY</div>
                        <div style={{fontSize:10,fontWeight:700,color:"#16a34a"}}>{p.time}</div>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

      </main>

      {/* ── FLOATING ASK AI BUTTON — persistent on all pages ── */}
      {!chatOpen&&(
        <button className="ai-fab" onClick={()=>setChatOpen(true)}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C6.5 2 2 6 2 11c0 2.5 1 4.7 2.7 6.3L3 22l4.7-1.7C9 20.8 10.5 21 12 21c5.5 0 10-4 10-9.5S17.5 2 12 2z"/><path d="M8 11h.01M12 11h.01M16 11h.01"/></svg>
          Ask AI
        </button>
      )}

      {/* ── AI DRAWER — slides from right ── */}
      {chatOpen&&(
        <>
          <div className="ai-drawer-backdrop" onClick={()=>setChatOpen(false)}/>
          <div className="ai-drawer">
            {/* Drawer header */}
            <div style={{padding:"14px 20px 12px",borderBottom:"1px solid #f1f5f9",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#6366f1,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C6.5 2 2 6 2 11c0 2.5 1 4.7 2.7 6.3L3 22l4.7-1.7C9 20.8 10.5 21 12 21c5.5 0 10-4 10-9.5S17.5 2 12 2z"/></svg>
                  </div>
                  <div>
                    <div style={{fontWeight:800,fontSize:14,color:"#0f172a",lineHeight:1}}>Research Intelligence</div>
                    <div style={{fontSize:10,color:"#94a3b8",marginTop:3}}>AI-assisted decision support</div>
                  </div>
                </div>
                <button onClick={()=>setChatOpen(false)} style={{width:28,height:28,borderRadius:7,border:"1px solid #e2e8f0",background:"#f8fafc",color:"#64748b",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>✕</button>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {["Climate researchers?","Biggest gaps?","Growth trends?","Top departments?","Recommendations?"].map(p=>(
                  <button key={p} onClick={()=>{setChatInput(p);}} style={{fontSize:10,padding:"5px 12px",borderRadius:20,border:"1px solid #e2e8f0",color:"#475569",background:"white",cursor:"pointer",fontWeight:500,transition:"all .15s"}}>{p}</button>
                ))}
              </div>
            </div>
            {/* Drawer messages */}
            <div style={{flex:1,overflowY:"auto",padding:"12px 20px",display:"flex",flexDirection:"column",gap:8}}>
              {chatMsgs.length===0&&(
                <div style={{textAlign:"center",paddingTop:40,color:"#94a3b8"}}>
                  <div style={{width:48,height:48,borderRadius:16,background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:20}}>💡</div>
                  <div style={{fontWeight:700,fontSize:13,color:"#64748b",marginBottom:4}}>Ask anything about Gies research</div>
                  <div style={{fontSize:11,lineHeight:1.6,maxWidth:260,margin:"0 auto"}}>SDG gaps, researcher profiles, department output, collaboration opportunities, or strategic recommendations.</div>
                </div>
              )}
              {chatMsgs.map((m,i)=>(
                <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}} className="fadein">
                  <div style={{maxWidth:"82%",padding:"10px 14px",borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",fontSize:12,lineHeight:1.6,whiteSpace:"pre-line",background:m.role==="user"?"#0a1628":"#f8fafc",color:m.role==="user"?"white":"#334155",border:m.role==="ai"?"1px solid #e2e8f0":"none",boxShadow:m.role==="ai"?"0 1px 3px rgba(0,0,0,.03)":"none"}}>{m.text}</div>
                </div>
              ))}
              {chatLoad&&(
                <div style={{display:"flex",gap:5,padding:"10px 14px",background:"#f8fafc",borderRadius:14,border:"1px solid #e2e8f0",width:"fit-content"}}>
                  {[0,150,300].map(d=><div key={d} className="bounce" style={{width:6,height:6,borderRadius:"50%",background:"#94a3b8",animationDelay:`${d}ms`}}/>)}
                </div>
              )}
            </div>
            {/* Drawer input */}
            <div style={{padding:"10px 20px 14px",borderTop:"1px solid #f1f5f9",flexShrink:0,background:"white"}}>
              <div style={{display:"flex",gap:6}}>
                <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleChat()}
                  placeholder="Ask about SDGs, researchers, or strategy..."
                  style={{flex:1,padding:"9px 14px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,fontSize:11,outline:"none",transition:"border .15s"}}/>
                <button onClick={handleChat} disabled={chatLoad||!chatInput.trim()}
                  style={{padding:"9px 14px",borderRadius:10,color:"white",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",fontWeight:700,fontSize:11,cursor:"pointer",opacity:chatLoad||!chatInput.trim()?0.4:1,transition:"all .15s",whiteSpace:"nowrap"}}>Send</button>
              </div>
              <div style={{textAlign:"center",marginTop:6,fontSize:8,color:"#b0b8c4"}}>Rules-based synthesis · Not predictive AI</div>
            </div>
          </div>
        </>
      )}

      {/* ── Single consolidated AI disclaimer in footer ── */}
      <footer style={{marginTop:8,borderTop:"1px solid #eef2f7",padding:"8px 20px",textAlign:"center",fontSize:9,color:"#94a3b8",lineHeight:1.4}}>
        <div>Gies College of Business · Impact Command Center · <strong>2,022</strong> publications · <strong>426</strong> sustainable papers</div>
        <div style={{marginTop:2,fontSize:9,color:"#b0b8c4"}}>
          Data: Illinois Experts via Elsevier Scopus · Global benchmark: UN SDG 2023 (normalized) · All insights are rules-based synthesis labeled "AI-assisted" — not predictions ·
          <button onClick={()=>setShowSources(true)} style={{background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:9,marginLeft:2}}>Methodology</button>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
